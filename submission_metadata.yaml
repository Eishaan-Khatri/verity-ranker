ai_usage_summary: |
  Claude used for code structure and documentation. Groq used for optional JD intelligence parsing 
  in precompute.py. The ranking script uses offline, rule-based extraction.

# ─── ARCHITECTURE & APPROACH ──────────────────────────────────────────
architecture:
  design_pattern: "Two-Script Pipeline (Offline Precompute + Sandbox Ranking)"
  
  precompute_phase:
    duration: "15-20 minutes"
    network_allowed: true
    scripts:
      - "precompute.py (orchestrator)"
      - "ai_hiring_ranker/hackathon/precompute_runner.py"
      - "ai_hiring_ranker/hackathon/features.py"
    
    layers:
      - layer: 2
        name: "JD Intelligence"
        method: "Gemini (1 call, optional) or regex fallback"
        output: "cache/jd_profile.json"
        
      - layer: 3
        name: "HyDE Ideal Profiles"
        method: "Gemini (1 call, optional) or default templates"
        output: "cache/hyde_profiles.json"
        
      - layer: 4-11
        name: "Candidate Feature Extraction"
        method: "Rule-based (regex + heuristics)"
        per_candidate: true
        output: "cache/candidate_features.jsonl (160MB)"
  
  ranking_phase:
    duration: "4-10 seconds"
    network_required: false
    gpu_required: false
    scripts:
      - "rank.py (orchestrator)"
      - "ai_hiring_ranker/hackathon/ranker.py"
      - "ai_hiring_ranker/hackathon/guards.py"
    
    steps:
      - step: 1
        name: "Load Precomputed Cache"
        method: "Disk read (160MB JSONL)"
        
      - step: 2
        name: "Apply Guard Layers"
        method: "Honeypot detection + keyword stuffer detection"
        
      - step: 3
        name: "Score & Rank"
        method: "6-dimensional weighted rubric (deterministic)"
        
      - step: 4
        name: "Select Top-100"
        method: "Listwise tie-break by candidate_id ascending"
        
      - step: 5
        name: "Generate Reasoning"
        method: "Rule-based evidence extraction from profile"
        
      - step: 6
        name: "Output CSV"
        method: "UTF-8 CSV with proper formatting"

# ─── KEY FEATURES ─────────────────────────────────────────────────────
key_features:
  retrieval:
    - "FAISS (dense vector search)"
    - "BM25 (sparse keyword matching)"
    - "Reciprocal Rank Fusion (RRF)"
    
  scoring:
    - "6-dimensional rubric (skill fit, experience, seniority, domain, growth, proof)"
    - "Weighted formula (deterministic)"
    
  trap_detection:
    - "Honeypot risk scoring (impossible claims, skill stuffing)"
    - "Behavioral signal contradictions (profile completeness vs skills)"
    - "Assessment score mismatches"
    - "Interview completion rate anomalies"
    - "Contact verification checks"
    
  robustness:
    - "Determinism: identical outputs on identical inputs"
    - "Malformed data handling: graceful degradation"
    - "Evidence ledger: audit trail for every claim"
    
  offline_safety:
    - "No network calls during rank.py"
    - "No GPU requirement"
    - "CPU-only execution"
    - "All intelligence precomputed and cached"

# ─── METHODOLOGY SUMMARY ───────────────────
methodology_summary: |
  PRISM uses a two-stage hybrid ranking system designed for production constraints.
  
  Stage 1 (Precompute, offline):
  - Parse JD with optional LLM (Gemini) into structured hiring profile
  - Generate 3 ideal candidate archetypes via HyDE for semantic reference
  - Extract 100K candidates via rule-based feature extraction (deterministic, fast)
  - Score each candidate on 6 dimensions (skill fit, experience depth, seniority match,
    domain match, career growth, proof strength)
  - Compute honeypot and keyword-stuffer risk scores
  - Cache all features to disk (160MB JSONL)
  
  Stage 2 (Ranking, sandbox-safe):
  - Load precomputed cache into memory (~2GB)
  - Apply guard layers (honeypot penalties, stuffer penalties)
  - Apply behavioral signal multipliers (engagement, transitions, contact verification)
  - Sort by final score (deterministic, reproducible)
  - Select top-100 with tie-breaking by candidate_id ascending
  - Generate evidence-backed reasoning for each rank
  - Output CSV submission
  
  Key innovation: Behavioral signal integration catches trap candidates by detecting
  profile contradictions (claims 10+ skills but profile <30% complete, claims skills
  but assessment scores <20%, never completes interviews, unverified contact).
  
  Constraint satisfaction: Ranking completes in 4 seconds on CPU, uses 2GB RAM,
  makes zero network calls, processes 100K candidates deterministically.

